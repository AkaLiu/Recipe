name: Export PDF Book

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Export PDF
        run: npm run pdf:book

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: recipe-collection-pdf
          path: public/recipe-collection.pdf
          if-no-files-found: error
